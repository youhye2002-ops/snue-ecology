<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>서울교육대학교 생태지도 (식물편)</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#f4f8f0;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
header{background:#2d6a2d;color:white;padding:11px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
header h1{font-size:16px;font-weight:600;}
header p{font-size:11px;opacity:.75;margin-top:2px;}
.hright{margin-left:auto;display:flex;align-items:center;gap:8px;}
.badge{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);padding:3px 11px;border-radius:20px;font-size:12px;}
.add-btn{background:#4aaa4a;border:none;color:white;padding:6px 14px;border-radius:20px;font-size:12px;cursor:pointer;font-weight:600;}
.add-btn:hover{background:#3d9a3d;}
.toolbar{background:white;padding:7px 16px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;border-bottom:1px solid #dde8d0;flex-shrink:0;}
.toolbar input{padding:5px 12px;border:1px solid #ccc;border-radius:20px;font-size:13px;width:150px;outline:none;}
.toolbar input:focus{border-color:#3d8a3d;}
.fbtn{padding:4px 10px;border:1px solid #ccc;border-radius:20px;font-size:12px;cursor:pointer;background:white;color:#555;display:flex;align-items:center;gap:4px;}
.fbtn:hover{border-color:#3d8a3d;color:#3d8a3d;}
.fbtn.active{color:white;border-color:transparent;}
.legend{margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.ldot{display:flex;align-items:center;gap:3px;font-size:11px;color:#555;}
.ldot span{width:9px;height:9px;border-radius:50%;display:inline-block;}
.main{display:flex;flex:1;overflow:hidden;}

/* 사이드바 */
.sidebar{width:240px;min-width:240px;background:white;border-right:1px solid #dde8d0;display:flex;flex-direction:column;}
.shead{padding:9px 14px;font-size:12px;font-weight:600;color:#555;background:#f8faf5;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.slist{overflow-y:auto;flex:1;}
.litem{display:flex;align-items:center;gap:8px;padding:8px 14px;cursor:pointer;border-bottom:1px solid #f0f4ec;}
.litem:hover{background:#f4f9f0;}
.litem.sel{background:#e8f5e0;}
.litem-del{margin-left:auto;width:20px;height:20px;border-radius:50%;border:none;background:transparent;color:#ccc;font-size:15px;cursor:pointer;flex-shrink:0;}
.litem-del:hover{background:#fee;color:#e84a4a;}
.ldotpin{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.lname{font-size:13px;font-weight:500;color:#1a1a1a;}
.lsci{font-size:10px;color:#888;font-style:italic;margin-top:1px;}
.lnum{font-size:10px;color:#ddd;flex-shrink:0;}
.lcat-tag{font-size:9px;padding:1px 5px;border-radius:8px;flex-shrink:0;font-weight:600;}

/* 지도 */
.map-area{flex:1;position:relative;overflow:hidden;background:#e8eedc;}
#map-img{position:absolute;top:0;left:0;transform-origin:0 0;user-select:none;-webkit-user-drag:none;}
#pin-svg{position:absolute;top:0;left:0;transform-origin:0 0;overflow:visible;pointer-events:none;}
#pin-svg .clickable{pointer-events:all;}
.tooltip{position:absolute;background:rgba(20,50,10,.88);color:white;padding:5px 10px;border-radius:8px;font-size:12px;pointer-events:none;display:none;white-space:nowrap;z-index:300;}
.zoom-btns{position:absolute;bottom:16px;right:16px;display:flex;flex-direction:column;gap:4px;z-index:100;}
.zbtn{width:32px;height:32px;background:white;border:1px solid #ccc;border-radius:8px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.12);}
.zbtn:hover{background:#f4f9f0;}
.hint-bar{position:absolute;bottom:16px;left:16px;font-size:11px;color:#666;background:rgba(255,255,255,.85);padding:5px 10px;border-radius:8px;}
.add-hint{position:absolute;top:12px;left:50%;transform:translateX(-50%);background:#2d6a2d;color:white;padding:7px 18px;border-radius:20px;font-size:13px;font-weight:600;z-index:200;pointer-events:none;display:none;box-shadow:0 2px 8px rgba(0,0,0,.2);}

/* 정보 패널 */
.info-panel{width:290px;min-width:290px;background:white;border-left:1px solid #dde8d0;display:flex;flex-direction:column;overflow-y:auto;}
.iph{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#bbb;font-size:13px;gap:10px;padding:30px;text-align:center;min-height:200px;}
.iph .big{font-size:40px;opacity:.25;}
.ic{padding:16px;display:none;flex-direction:column;gap:12px;}
.ic.vis{display:flex;}

/* 갤러리 */
.gallery-main{position:relative;width:100%;height:155px;background:#f0f6e8;border-radius:10px;border:1px solid #dde8c0;overflow:hidden;}
.gallery-main img{width:100%;height:100%;object-fit:cover;cursor:zoom-in;display:none;}
.no-img{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:6px;color:#bbb;font-size:12px;}
.no-img span{font-size:34px;}
.g-arrow{position:absolute;top:50%;transform:translateY(-50%);width:26px;height:26px;background:rgba(0,0,0,.4);color:white;border:none;border-radius:50%;cursor:pointer;font-size:15px;display:none;align-items:center;justify-content:center;z-index:10;}
.g-arrow:hover{background:rgba(0,0,0,.65);}
.g-arrow.left{left:6px;}
.g-arrow.right{right:6px;}
.g-count{position:absolute;bottom:6px;right:8px;background:rgba(0,0,0,.48);color:white;font-size:11px;padding:2px 7px;border-radius:10px;display:none;}
.gallery-thumbs{display:flex;gap:5px;align-items:center;flex-wrap:wrap;}
.thumb-wrap{position:relative;flex-shrink:0;}
.thumb{width:42px;height:42px;border-radius:6px;object-fit:cover;cursor:pointer;border:2px solid transparent;display:block;}
.thumb.active{border-color:#3d8a3d;}
.thumb-del{position:absolute;top:-4px;right:-4px;width:15px;height:15px;border-radius:50%;background:#e84a4a;color:white;border:none;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;line-height:1;padding:0;}
.thumb-add{width:42px;height:42px;border-radius:6px;border:1.5px dashed #bbb;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;color:#bbb;flex-shrink:0;background:white;}
.thumb-add:hover{border-color:#3d8a3d;color:#3d8a3d;background:#f4f9f0;}
.storage-bar-wrap{background:#eee;border-radius:4px;height:4px;overflow:hidden;}
.storage-bar{height:100%;background:#3d9a3d;border-radius:4px;transition:width .3s;}
.storage-info{font-size:10px;color:#bbb;text-align:right;}

/* 종 헤더 */
.species-header{display:flex;align-items:center;gap:10px;}
.iemoji{width:48px;height:48px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;}
.iname{font-size:17px;font-weight:700;color:#1a1a1a;line-height:1.2;}
.isci{font-size:11px;color:#999;font-style:italic;margin-top:2px;}
.itag{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;margin-top:3px;}

/* 정보 섹션 */
.ilbl{font-size:11px;color:#999;font-weight:600;letter-spacing:.4px;margin-bottom:3px;}
.itxt{font-size:13px;color:#333;line-height:1.75;white-space:pre-wrap;word-break:break-word;}
.ichips{display:flex;gap:5px;flex-wrap:wrap;}
.chip{font-size:11px;background:#f4f8f0;border:1px solid #d0e8c0;color:#3d6a2d;padding:3px 8px;border-radius:20px;}

/* 관찰시각 */
.time-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.dt-seg{width:44px;padding:5px 4px;border:1px solid #ddd;border-radius:7px;font-size:13px;text-align:center;outline:none;font-family:inherit;color:#333;background:white;}
.dt-seg:focus{border-color:#3d8a3d;background:#f8fff4;}
.dt-seg.yr{width:56px;}
.dt-seg.hr{width:38px;}
.dt-sep{font-size:13px;color:#bbb;flex-shrink:0;user-select:none;}
.ampm-wrap{display:flex;border:1px solid #ddd;border-radius:7px;overflow:hidden;flex-shrink:0;}
.ampm-btn{padding:5px 8px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:white;color:#aaa;transition:all .12s;}
.ampm-btn.on{background:#2d6a2d;color:white;}

.action-btns{display:flex;gap:6px;}
.edit-btn{flex:1;padding:7px;border:1px solid #ccc;border-radius:8px;background:white;font-size:12px;cursor:pointer;color:#555;}
.edit-btn:hover{background:#f4f9f0;border-color:#3d8a3d;color:#3d8a3d;}
.del-btn{padding:7px 12px;border:1px solid #fcc;border-radius:8px;background:white;font-size:12px;cursor:pointer;color:#e84a4a;}
.del-btn:hover{background:#fee;}

/* 라이트박스 */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:1000;display:none;align-items:center;justify-content:center;flex-direction:column;gap:10px;}
.lightbox.open{display:flex;}
.lightbox img{max-width:90vw;max-height:78vh;object-fit:contain;border-radius:8px;}
.lb-close{position:absolute;top:16px;right:20px;background:none;border:none;color:white;font-size:28px;cursor:pointer;}
.lb-arrow{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.15);border:none;color:white;font-size:22px;width:44px;height:44px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.lb-arrow:hover{background:rgba(255,255,255,.3);}
.lb-arrow.left{left:20px;}
.lb-arrow.right{right:20px;}
.lb-thumbs{display:flex;gap:8px;}
.lb-thumb{width:46px;height:46px;object-fit:cover;border-radius:6px;cursor:pointer;border:2px solid transparent;opacity:.55;}
.lb-thumb.active{border-color:white;opacity:1;}

/* 모달 */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;display:none;align-items:center;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:white;border-radius:16px;padding:22px;width:340px;max-width:95vw;display:flex;flex-direction:column;gap:12px;max-height:90vh;overflow-y:auto;}
.modal h2{font-size:15px;font-weight:700;}
.modal label{font-size:12px;font-weight:600;color:#555;display:block;margin-bottom:4px;}
.modal input,.modal select,.modal textarea{width:100%;padding:8px 11px;border:1px solid #ddd;border-radius:8px;font-size:13px;outline:none;font-family:inherit;}
.modal input:focus,.modal select:focus,.modal textarea:focus{border-color:#3d8a3d;}
.modal textarea{resize:vertical;min-height:70px;line-height:1.6;}
.modal-btns{display:flex;gap:8px;margin-top:2px;}
.mbtn{flex:1;padding:9px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;}
.mbtn.save{background:#3d8a3d;color:white;}
.mbtn.save:hover{background:#2d7a2d;}
.mbtn.cancel{background:#f0f0f0;color:#555;}
.emoji-picker{display:flex;flex-wrap:wrap;gap:5px;padding:8px;background:#f8f8f8;border-radius:8px;border:1px solid #eee;max-height:105px;overflow-y:auto;}
.ep-btn{width:30px;height:30px;font-size:17px;display:flex;align-items:center;justify-content:center;border-radius:6px;cursor:pointer;border:2px solid transparent;}
.ep-btn:hover{background:#e8f5e0;}
.ep-btn.chosen{border-color:#3d8a3d;background:#e8f5e0;}
</style>
</head>
<body>
<header>
  <div style="font-size:24px">🌿</div>
  <div><h1>서울교육대학교 생태지도 <span style="font-weight:400;opacity:.8;font-size:13px">— 식물편</span></h1><p>교내 생물 관찰 기록 시스템</p></div>
  <div class="hright">
    <div class="badge" id="badge">30종 등록</div>
    <button class="add-btn" id="addBtn" onclick="toggleAddMode()">+ 핀 추가</button>
    <button class="add-btn" id="moveBtn" onclick="toggleMoveMode()" style="background:#1a7fc4;">✥ 핀 이동</button>
    <button class="add-btn" onclick="exportHTML()" style="background:#7a4ac4;" title="모든 데이터가 포함된 완성본 HTML 파일을 다운로드합니다">💾 완성본 저장</button>
  </div>
</header>

<div class="toolbar">
  <input id="srch" placeholder="🔍  종 이름 검색..." oninput="applyF()">
  <button class="fbtn active" onclick="setCat('전체',this)" style="background:#555;color:white;border-color:#555;">전체</button>
  <button class="fbtn" onclick="setCat('침엽수',this)">🌲 침엽수</button>
  <button class="fbtn" onclick="setCat('속씨-교목',this)">🌳 속씨·교목</button>
  <button class="fbtn" onclick="setCat('속씨-관목',this)">🌸 속씨·관목</button>
  <button class="fbtn" onclick="setCat('속씨-초본',this)">🌼 속씨·초본</button>
  <button class="fbtn" onclick="setCat('곤충',this)">🐞 곤충</button>
</div>

function loadData(){
  try {
    const saved = JSON.parse(localStorage.getItem('snue_eco') || '[]');
    // 기본 30종에 저장된 데이터(사진, 설명, 시각 등) 병합
    const merged = DEFAULT_SP.map(d => {
      const s = saved.find(x => x.id === d.id);
      if(s){
        // 사용자 입력값만 병합 (분류/이름/학명/이모지는 기본값, 좌표/사진/설명/시각은 saved 우선)
        return Object.assign({photos:[], desc:'', obstime:''}, d, {
          cx:     s.cx     ?? d.cx,
          cy:     s.cy     ?? d.cy,
          photos: s.photos || [],
          desc:   s.desc   || '',
          obstime:s.obstime|| '',
          season: s.season || '',
          note:   s.note   || ''
        });
      }
      return Object.assign({photos:[], desc:'', obstime:''}, d);
    });
    // 사용자가 추가한 종(id > 30)도 포함
    const extras = saved.filter(x => x.id > 30);
    return merged.concat(extras);
  } catch(e) { return DEFAULT_SP.map(d => Object.assign({photos:[], desc:'', obstime:''}, d)); }
}
function saveData(){
  try { localStorage.setItem('snue_eco', JSON.stringify(SP)); updateStorageBar(); }
  catch(e) { alert('저장공간 부족! 사진을 줄여주세요.'); }
}
let SP = loadData();
let nextId = Math.max(30, ...SP.map(s=>s.id)) + 1;

function getStorageMB(){
  try{let t=0;for(let k in localStorage)t+=localStorage[k].length+k.length;return t*2/1024/1024;}catch{return 0;}
}
function updateStorageBar(){
  const u=getStorageMB(),p=Math.min(u/MAX_MB*100,100);
  const bar=document.getElementById('storageBar');
  if(!bar)return;
  bar.style.width=p+'%';
  bar.style.background=p>80?'#e85a2a':p>60?'#c47a1a':'#3d9a3d';
  document.getElementById('storageInfo').textContent='저장: '+u.toFixed(1)+'MB / '+MAX_MB+'MB';
}

// ── 지도 pan/zoom ────────────────────────────────────────
const mapImg=document.getElementById('map-img');
const pinSvg=document.getElementById('pin-svg');
const mapa=document.getElementById('mapa');
let scale=1,tx=0,ty=0,dragging=false,moved=false,sx=0,sy=0,stx=0,sty=0;
function applyT(){const t=`translate(${tx}px,${ty}px) scale(${scale})`;mapImg.style.transform=t;pinSvg.style.transform=t;}
function resetView(){
  const iw=mapImg.naturalWidth||1209,ih=mapImg.naturalHeight||1024;
  scale=Math.min(mapa.clientWidth/iw,mapa.clientHeight/ih)*0.97;
  tx=(mapa.clientWidth-iw*scale)/2;ty=(mapa.clientHeight-ih*scale)/2;
  applyT();pinSvg.setAttribute('width',iw);pinSvg.setAttribute('height',ih);
}
mapImg.onload=()=>setTimeout(resetView,50);setTimeout(resetView,400);
function zoom(f){const cx=mapa.clientWidth/2,cy=mapa.clientHeight/2;tx=cx-(cx-tx)*f;ty=cy-(cy-ty)*f;scale*=f;applyT();}
mapa.addEventListener('wheel',e=>{
  e.preventDefault();const f=e.deltaY<0?1.12:0.89;
  const r=mapa.getBoundingClientRect();tx=(e.clientX-r.left)-(e.clientX-r.left-tx)*f;ty=(e.clientY-r.top)-(e.clientY-r.top-ty)*f;scale*=f;applyT();
},{passive:false});
mapa.addEventListener('mousedown',e=>{
  if(e.button!==0)return;
  // 핀 이동 모드여도 핀 위가 아닌 빈 곳이면 지도 pan 허용
  if(moveMode && e.target.closest('g.clickable')) return;
  dragging=true;moved=false;sx=e.clientX;sy=e.clientY;stx=tx;sty=ty;
});
window.addEventListener('mousemove',e=>{if(!dragging)return;const dx=e.clientX-sx,dy=e.clientY-sy;if(Math.abs(dx)+Math.abs(dy)>3)moved=true;tx=stx+dx;ty=sty+dy;applyT();});
window.addEventListener('mouseup',e=>{
  if(!dragging)return;dragging=false;
  if(!moved&&addMode){
    const r=mapa.getBoundingClientRect();pendingCx=(e.clientX-r.left-tx)/scale;pendingCy=(e.clientY-r.top-ty)/scale;openModal();
  }
});

// ── 사진 ─────────────────────────────────────────────────
let gIdx=0;
function compressImage(file,maxW,maxH,q){
  return new Promise(resolve=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const canvas=document.getElementById('compCanvas');
        let w=img.width,h=img.height;
        if(w>maxW||h>maxH){const r=Math.min(maxW/w,maxH/h);w=Math.round(w*r);h=Math.round(h*r);}
        canvas.width=w;canvas.height=h;canvas.getContext('2d').drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg',q));
      };img.src=e.target.result;
    };reader.readAsDataURL(file);
  });
}
function triggerImgUpload(){
  const s=SP.find(x=>x.id===selId);if(!s)return;
  if((s.photos||[]).length>=MAX_PHOTOS){alert('최대 5장까지 가능합니다.');return;}
  document.getElementById('imgFile').click();
}
async function handleImgs(input){
  const s=SP.find(x=>x.id===selId);if(!s)return;
  if(!s.photos)s.photos=[];
  const rem=MAX_PHOTOS-s.photos.length;
  for(const file of Array.from(input.files).slice(0,rem)){
    const c=await compressImage(file,800,600,0.72);
    if(getStorageMB()+(c.length*2/1024/1024)>MAX_MB){alert('저장공간 부족!');break;}
    s.photos.push(c);
  }
  input.value='';gIdx=s.photos.length-1;saveData();renderGallery(s);
}
function removePhoto(idx){
  const s=SP.find(x=>x.id===selId);if(!s)return;
  if(!confirm('이 사진을 삭제할까요?'))return;
  s.photos.splice(idx,1);gIdx=Math.max(0,gIdx-1);saveData();renderGallery(s);
}
function renderGallery(s){
  const photos=s.photos||[];
  const mi=document.getElementById('gMainImg'),ni=document.getElementById('gNoImg');
  document.getElementById('gEmojiBig').textContent=s.emoji||'🌿';
  if(photos.length===0){mi.style.display='none';ni.style.display='';}
  else{if(gIdx>=photos.length)gIdx=photos.length-1;mi.src=photos[gIdx];mi.style.display='block';ni.style.display='none';}
  const show=photos.length>1;
  document.getElementById('gLeft').style.display=show?'flex':'none';
  document.getElementById('gRight').style.display=show?'flex':'none';
  document.getElementById('gCount').style.display=show?'block':'none';
  if(show)document.getElementById('gCount').textContent=(gIdx+1)+' / '+photos.length;
  const thumbs=document.getElementById('gThumbs');thumbs.innerHTML='';
  photos.forEach((p,i)=>{
    const wrap=document.createElement('div');wrap.className='thumb-wrap';
    const img=document.createElement('img');img.src=p;img.className='thumb'+(i===gIdx?' active':'');img.onclick=()=>{gIdx=i;renderGallery(s);};
    const del=document.createElement('button');del.className='thumb-del';del.textContent='×';del.onclick=e=>{e.stopPropagation();removePhoto(i);};
    wrap.appendChild(img);wrap.appendChild(del);thumbs.appendChild(wrap);
  });
  if(photos.length<MAX_PHOTOS){const a=document.createElement('div');a.className='thumb-add';a.textContent='+';a.onclick=triggerImgUpload;thumbs.appendChild(a);}
  updateStorageBar();
}
function gNav(dir){const s=SP.find(x=>x.id===selId);if(!s)return;gIdx=(gIdx+dir+s.photos.length)%s.photos.length;renderGallery(s);}

// ── 렌더 ─────────────────────────────────────────────────
let cat='전체',srch='',selId=null;
function gc(c){return CC[c]||'#888';}
function vis(s){return(cat==='전체'||s.cat===cat)&&(!srch||s.name.includes(srch)||(s.sci||'').toLowerCase().includes(srch.toLowerCase()));}

function rPins(){
  pinSvg.innerHTML='';

    const col=gc(s.cat),isS=selId===s.id,isV=vis(s);
    const g=document.createElementNS('http://www.w3.org/2000/svg','g');

    const pulseAnim = isS ? `<animateTransform attributeName="transform" type="scale" values="1;1.18;1" dur="1.2s" repeatCount="indefinite"/>` : '';
    g.innerHTML=`
      ${isS ? `<circle r="${r+18}" fill="${col}" opacity=".13"><animate attributeName="r" values="${r+10};${r+20};${r+10}" dur="1.4s" repeatCount="indefinite"/><animate attributeName="opacity" values=".18;0.04;.18" dur="1.4s" repeatCount="indefinite"/></circle>` : ''}
      ${isS ? `<circle r="${r+9}" fill="none" stroke="${col}" stroke-width="2" opacity=".5"><animate attributeName="r" values="${r+6};${r+13};${r+6}" dur="1.4s" repeatCount="indefinite"/><animate attributeName="opacity" values=".6;0;.6" dur="1.4s" repeatCount="indefinite"/></circle>` : ''}
      <circle r="${r+7}" fill="${col}" opacity="${isS?.22:.1}"/>
      <circle r="${r}" fill="${col}" stroke="white" stroke-width="${isS?3:2}" style="filter:drop-shadow(0 ${isS?3:1}px ${isS?8:3}px rgba(0,0,0,${isS?.4:.28}))"/>
      <circle r="${r*.38}" fill="white" opacity=".6"/>
      <line x1="0" y1="${-(r*.72)}" x2="0" y2="${r*.72}" stroke="white" stroke-width="1.2" opacity=".55"/>
      <line x1="${-(r*.72)}" y1="0" x2="${r*.72}" y2="0" stroke="white" stroke-width="1.2" opacity=".55"/>
      <text y="${-(r+6)}" text-anchor="middle" font-size="${isS?14:11}" font-family="Apple SD Gothic Neo,sans-serif" font-weight="${isS?800:500}" fill="${isS?col:'#111'}" style="paint-order:stroke;stroke:white;stroke-width:${isS?5:3.5}px;">${s.name}</text>`;

  const sorted=[...SP].filter(vis).sort((a,b)=>a.name.localeCompare(b.name,'ko'));
  sorted.forEach((s,i)=>{

function selS(id){
  selId=id; gIdx=0;
  const s=SP.find(x=>x.id===id); if(!s)return;
  showInfo(s); rPins(); rList();
  // 선택한 핀이 지도 중앙에 오도록 부드럽게 이동
  const area=document.getElementById('mapa');
  const targetTx = area.clientWidth/2  - s.cx*scale;
  const targetTy = area.clientHeight/2 - s.cy*scale;
  animatePan(targetTx, targetTy);
}
function animatePan(toTx, toTy){
  const startTx=tx, startTy=ty;
  const dist=Math.sqrt((toTx-startTx)**2+(toTy-startTy)**2);
  if(dist<2)return;
  const dur=Math.min(400, dist*0.4);
  const t0=performance.now();
  function step(now){
    const p=Math.min((now-t0)/dur,1);
    const ease=p<.5?2*p*p:1-Math.pow(-2*p+2,2)/2;
    tx=startTx+(toTx-startTx)*ease;
    ty=startTy+(toTy-startTy)*ease;
    applyT();
    if(p<1)requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}
function showInfo(s){
  document.getElementById('iph').style.display='none';
  document.getElementById('ic').classList.add('vis');
  renderGallery(s);
  const em=document.getElementById('iemoji');em.textContent=s.emoji||'🌿';em.style.background=CB[s.cat]||'#eee';
  document.getElementById('iname').textContent=s.name;
  document.getElementById('isci').textContent=s.sci||'학명 미기재';
  const tg=document.getElementById('itag');tg.textContent=CATNAMES[s.cat]||s.cat;

  var descText = s.desc||'—';

  const tp=(s.obstime||'').split('.');
  document.getElementById('dt-year').value=tp[0]||'';
  document.getElementById('dt-month').value=tp[1]||'';
  document.getElementById('dt-day').value=tp[2]||'';
  setAmPm(tp[3]||'AM',true);
  document.getElementById('dt-hour').value=tp[4]||'';
  // chips: season + note
  document.getElementById('ichips').innerHTML=
    (s.season?`<span class="chip">🗓 ${s.season}</span>`:'')+
    (s.note?`<span class="chip">💬 ${s.note}</span>`:'');
}
function showTT(e,s){
  const tt=document.getElementById('tt'),r=mapa.getBoundingClientRect();

  const s=SP.find(x=>x.id===id);if(!s)return;

function applyF(){srch=document.getElementById('srch').value;rPins();rList();}
function setCat(c,b){
  cat=c;

// ── 핀 이동 모드 ─────────────────────────────────────────
let moveMode = false;
let draggingPin = null, dragPinStartX = 0, dragPinStartY = 0, dragPinOrigCx = 0, dragPinOrigCy = 0;

function toggleMoveMode(){
  moveMode = !moveMode;
  const btn = document.getElementById('moveBtn');
  if(moveMode){
    if(addMode) toggleAddMode(); // 추가모드 끄기

// 핀 드래그 이벤트 (SVG 위에서)
pinSvg.addEventListener('mousedown', e => {
  if(!moveMode) return;
  const g = e.target.closest('g.clickable');
  if(!g) return;
  e.stopPropagation();
  e.preventDefault();
  // id 찾기
  const nameEl = g.querySelector('text');
  if(!nameEl) return;
  const name = nameEl.textContent;
  const s = SP.find(x => x.name === name);
  if(!s) return;
  draggingPin = s;
  const r = mapa.getBoundingClientRect();
  dragPinStartX = e.clientX;
  dragPinStartY = e.clientY;
  dragPinOrigCx = s.cx;
  dragPinOrigCy = s.cy;
  g.style.cursor = 'grabbing';
});

window.addEventListener('mousemove', e => {
  if(!draggingPin) return;
  const dx = (e.clientX - dragPinStartX) / scale;
  const dy = (e.clientY - dragPinStartY) / scale;
  draggingPin.cx = Math.round(dragPinOrigCx + dx);
  draggingPin.cy = Math.round(dragPinOrigCy + dy);
  rPins();
});

window.addEventListener('mouseup', e => {
  if(!draggingPin) return;
  saveData();
  draggingPin = null;
});


// ── 완성본 내보내기 ──────────────────────────────────────
function exportHTML(){
  // 현재 SP 데이터(사진 포함)를 HTML 안에 직접 구워서 새 파일 생성
  const dataJson = JSON.stringify(SP);
  // 현재 HTML에서 DEFAULT_SP 정의 부분을 현재 데이터로 교체
  let src = document.documentElement.outerHTML;

  // DEFAULT_SP를 현재 SP로 교체
  src = src.replace(
    /const DEFAULT_SP = \[[\s\S]*?\];/,
    'const DEFAULT_SP = ' + dataJson + ';'
  );

  // loadData를 단순화: DEFAULT_SP를 그대로 반환 (localStorage 불필요)
  src = src.replace(
    /function loadData\(\)\{[\s\S]*?\}/,
    `function loadData(){
  return DEFAULT_SP.map(d => Object.assign({photos:[], desc:'', obstime:'', season:'', note:''}, d));
}`
  );

  const blob = new Blob([src], {type: 'text/html;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const now = new Date();
  const stamp = now.getFullYear()+''+String(now.getMonth()+1).padStart(2,'0')+String(now.getDate()).padStart(2,'0');
  a.download = '서울교대_생태지도_' + stamp + '.html';
  a.click();
  URL.revokeObjectURL(a.href);
  
  // 완료 알림
  setTimeout(()=>alert('✅ 완성본이 저장됐어요!\n\n이 파일을 제출하면 누가 어디서 열어도\n사진과 내용이 그대로 보입니다.'), 300);
}


// ── 드래그앤드롭 & Ctrl+V 사진 업로드 ───────────────────
const gMainEl = document.getElementById('gMain');

// 드래그 오버
gMainEl.addEventListener('dragover', e => {
  e.preventDefault();
  if(selId) gMainEl.classList.add('dragover');
});
gMainEl.addEventListener('dragleave', () => gMainEl.classList.remove('dragover'));
gMainEl.addEventListener('drop', async e => {
  e.preventDefault();
  gMainEl.classList.remove('dragover');
  if(!selId){ alert('먼저 종을 선택하세요.'); return; }
  const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
  if(!files.length) return;
  await addPhotoFiles(files);
});

// Ctrl+V 클립보드 붙여넣기
document.addEventListener('paste', async e => {
  if(!selId) return;
  // 모달 열려있으면 무시
  if(document.getElementById('modal').classList.contains('open')) return;
  const items = Array.from(e.clipboardData.items).filter(i => i.type.startsWith('image/'));
  if(!items.length) return;
  const files = items.map(i => i.getAsFile()).filter(Boolean);
  await addPhotoFiles(files);
});

// 공통 파일 처리 함수
async function addPhotoFiles(files){
  const s = SP.find(x => x.id === selId); if(!s) return;
  if(!s.photos) s.photos = [];
  const rem = MAX_PHOTOS - s.photos.length;
  if(rem <= 0){ alert('최대 5장까지 가능합니다.'); return; }
  const toProcess = files.slice(0, rem);
  if(files.length > rem) alert(`${rem}장만 추가됩니다.`);
  for(const file of toProcess){
    const c = await compressImage(file, 800, 600, 0.72);
    if(getStorageMB() + (c.length*2/1024/1024) > MAX_MB){
      alert('저장공간 부족! 기존 사진을 삭제해주세요.'); break;
    }
    s.photos.push(c);
  }
  gIdx = s.photos.length - 1;
  saveData(); renderGallery(s);
}
